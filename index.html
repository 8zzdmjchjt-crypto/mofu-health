<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#78a98b">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <title>モフノート v1.1</title>
</head>
<body>
<div id="app">
  <header class="app-header">
    <div>
      <div class="brand">🐾 モフノート</div>
      <div class="sub">小動物の健康記録アプリ v1.1</div>
    </div>
    <button class="round" id="addPetBtn">＋</button>
  </header>

  <main>
    <section class="view active" id="homeView">
      <h2>ホーム</h2>
      <div class="hero">
        <div>
          <b>今日の記録</b>
          <p>体重・ごはん・砂浴び・部屋んぽ・通院・投薬をまとめて管理</p>
        </div>
        <div class="heroAnimal">🐭</div>
      </div>
      <div id="petList"></div>
    </section>

    <section class="view" id="calendarView">
      <h2>カレンダー</h2>
      <div class="monthBar">
        <button id="prevMonth">‹</button>
        <strong id="monthTitle"></strong>
        <button id="nextMonth">›</button>
      </div>
      <div class="week"><span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span></div>
      <div class="calendar" id="calendar"></div>
      <div class="legend"><span>● 記録</span><span>🏥 通院</span><span>💊 投薬</span><span>🎂 記念日</span></div>
      <h3 id="dayTitle">今日の記録</h3>
      <div id="dayRecords"></div>
    </section>

    <section class="view" id="recordView">
      <h2>記録をつける</h2>
      <div class="petMini" id="recordPetMini"></div>
      <form id="recordForm">
        <label>日付<input type="date" id="date"></label>
        <label>体重(g)<input type="number" id="weight" placeholder="540"></label>
        <label>ペレット(g)<input type="number" id="pellet" placeholder="18"></label>
        <label>チモシー<select id="hay"><option>よく食べた</option><option>普通</option><option>少ない</option><option>食べてない</option></select></label>
        <label>食欲<select id="appetite"><option>◎</option><option>○</option><option>△</option><option>×</option></select></label>
        <label>元気<select id="energy"><option>◎</option><option>○</option><option>△</option><option>×</option></select></label>
        <label>うんち<select id="poop"><option>普通</option><option>少ない</option><option>小さい</option><option>やわらかい</option><option>出てない</option></select></label>

        <h3>今日の活動</h3>
        <label class="check"><span>砂浴び</span><input type="checkbox" id="sandBath"></label>
        <label>砂浴び時間(分)<input type="number" id="sandMinutes" placeholder="10"></label>
        <label class="check"><span>部屋んぽ</span><input type="checkbox" id="walk"></label>
        <label>部屋んぽ時間(分)<input type="number" id="walkMinutes" placeholder="30"></label>

        <h3>環境</h3>
        <label>温度(℃)<input type="number" step="0.1" id="temp" placeholder="22.5"></label>
        <label>湿度(%)<input type="number" id="humidity" placeholder="55"></label>
        <label class="memo">メモ<textarea id="memo" placeholder="元気いっぱい。砂浴びたくさんしてた😊"></textarea></label>
        <button type="submit" class="primary">保存</button>
      </form>
    </section>

    <section class="view" id="profileView">
      <h2>プロフィール</h2>
      <div class="petTabs" id="profilePetTabs"></div>
      <div class="profileCard" id="profileCard"></div>

      <h3>アイコン選択</h3>
      <div class="iconGrid" id="iconGrid"></div>

      <h3>写真登録</h3>
      <div class="photoBox">
        <input type="file" accept="image/*" id="photoInput">
        <button class="secondary" id="removePhotoBtn">写真を削除</button>
      </div>

      <h3>お迎え記念日</h3>
      <label class="formLine">お迎え日<input type="date" id="adoptionDate"></label>
      <button class="primary" id="saveProfileBtn">プロフィール保存</button>
    </section>

    <section class="view" id="medicalView">
      <h2>通院・投薬</h2>
      <div class="petTabs" id="medicalPetTabs"></div>

      <h3>通院記録</h3>
      <form id="hospitalForm">
        <label>通院日<input type="date" id="hospitalDate"></label>
        <label>病院名<input type="text" id="hospitalName" placeholder="○○動物病院"></label>
        <label>内容<input type="text" id="hospitalReason" placeholder="定期健診・食欲不振など"></label>
        <label>費用<input type="number" id="hospitalCost" placeholder="3850"></label>
        <label class="memo">メモ<textarea id="hospitalMemo"></textarea></label>
        <button class="primary" type="submit">通院記録を保存</button>
      </form>
      <div id="hospitalList"></div>

      <h3>投薬記録</h3>
      <form id="medicineForm">
        <label>薬名<input type="text" id="medicineName" placeholder="整腸剤"></label>
        <label>回数<input type="text" id="medicineDose" placeholder="1日2回"></label>
        <label>開始日<input type="date" id="medicineStart"></label>
        <label>終了日<input type="date" id="medicineEnd"></label>
        <label class="memo">メモ<textarea id="medicineMemo"></textarea></label>
        <button class="primary" type="submit">投薬記録を保存</button>
      </form>
      <div id="medicineList"></div>
    </section>

    <section class="view" id="graphView">
      <h2>グラフ</h2>
      <div class="petTabs" id="graphPetTabs"></div>
      <div class="graphSwitch">
        <button data-graph="weight" class="active">体重</button>
        <button data-graph="sand">砂浴び</button>
        <button data-graph="walk">部屋んぽ</button>
      </div>
      <canvas id="graph" width="350" height="240"></canvas>
      <div class="stats">
        <div><small>最高</small><b id="maxValue">-</b></div>
        <div><small>最低</small><b id="minValue">-</b></div>
        <div><small>変化</small><b id="diffValue">-</b></div>
      </div>
    </section>

    <section class="view" id="moreView">
      <h2>その他</h2>
      <div class="anniv" id="annivBox"></div>
      <button class="menu" onclick="show('profileView')">🐭 プロフィール・写真・アイコン選択</button>
      <button class="menu" onclick="show('medicalView')">🏥 通院・投薬記録</button>
      <button class="menu" id="exportBtn">⬇ データを書き出す</button>
      <button class="menu" id="resetBtn">↩ サンプルに戻す</button>
      <p class="notice">このアプリは記録用です。診断や治療の代わりにはなりません。</p>
    </section>
  </main>

  <nav>
    <button data-view="homeView" class="active">🏠<small>ホーム</small></button>
    <button data-view="calendarView">📅<small>カレンダー</small></button>
    <button data-view="recordView">✏️<small>記録</small></button>
    <button data-view="graphView">📈<small>グラフ</small></button>
    <button data-view="moreView">⋯<small>その他</small></button>
  </nav>
</div>

<dialog id="petDialog">
  <h2>ペット追加</h2>
  <label>名前<input id="newName" placeholder="モカ"></label>
  <label>種類<input id="newType" placeholder="チンチラ"></label>
  <label>性別<select id="newSex"><option value="♀">女の子</option><option value="♂">男の子</option><option value="不明">不明</option></select></label>
  <div class="dialogBtns">
    <button id="closePet">閉じる</button>
    <button id="savePet" class="primary">追加</button>
  </div>
</dialog>

<script src="app.js"></script>
</body>
</html>
