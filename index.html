<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#78a98b">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
<title>モフノート v1.2</title>
</head>
<body>
<div id="app">
<header>
  <div><div class="brand">🐾 モフノート</div><div class="sub">小動物の健康記録アプリ v1.7.1</div></div>
  <button id="openPetDialog" class="round">＋</button>
</header>

<main>
<section id="homeView" class="view active">
  <h1>ホーム</h1>
  <div class="hero"><div><b>今日の記録</b><p>体重・ごはん・砂浴び・部屋んぽ・通院・投薬を管理</p></div><img src="animal_chinchilla.png"></div>
  <div id="petList"></div>
</section>

<section id="calendarView" class="view">
  <h1>カレンダー</h1>
  <div class="monthbar"><button id="prevMonth">‹</button><b id="monthTitle"></b><button id="nextMonth">›</button></div>
  <div class="week"><span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span></div>
  <div id="calendar" class="calendar"></div>
  <h2 id="dayTitle">今日の記録</h2>
  <div id="dayList"></div>
</section>

<section id="recordView" class="view">
  <h1>記録</h1>
  <div id="selectedPetBox" class="pet-mini"></div>
  <form id="recordForm">
    <label>日付<input id="recordDate" type="date"></label>
    <label>体重(g)<input id="weight" type="number"></label>
    <label>食欲<select id="appetite"><option>◎</option><option>○</option><option>△</option><option>×</option></select></label>
    <label>元気<select id="energy"><option>◎</option><option>○</option><option>△</option><option>×</option></select></label>
    <label>うんち<select id="poop"><option>普通</option><option>少ない</option><option>小さい</option><option>やわらかい</option><option>出てない</option></select></label>
    <label class="check">砂浴び<input id="sandBath" type="checkbox"></label>
    <label>砂浴び時間(分)<input id="sandMinutes" type="number"></label>
    <label class="check">部屋んぽ<input id="walk" type="checkbox"></label>
    <label>部屋んぽ時間(分)<input id="walkMinutes" type="number"></label>
    <label>温度(℃)<input id="temp" type="number" step="0.1"></label>
    <label>湿度(%)<input id="humidity" type="number"></label>
    <label class="memo">メモ<textarea id="memo"></textarea></label>
    <button class="primary" type="submit">保存</button>
  </form>
</section>

<section id="profileView" class="view">
  <h1>プロフィール</h1>
  <div id="profileTabs" class="tabs"></div>
  <div id="profileCard" class="card"></div>
  <h2>アイコン選択</h2>
  <div id="iconGrid" class="icon-grid"></div>
  <h2>写真登録</h2>
  <div class="card"><input id="photoInput" type="file" accept="image/*"><button id="removePhoto" class="secondary">写真を削除</button></div>
  <label class="formline">誕生日<input id="birthday" type="date"></label>
  <label class="formline">お迎え日<input id="adoptionDate" type="date"></label>
  <button id="saveProfile" class="primary">プロフィール保存</button>
</section>

<section id="medicalView" class="view">
  <h1>通院・投薬</h1>
  <div id="medicalTabs" class="tabs"></div>
  <h2>通院記録</h2>
  <form id="hospitalForm">
    <label>通院日<input id="hospitalDate" type="date"></label>
    <label>病院名<input id="hospitalName"></label>
    <label>内容<input id="hospitalReason"></label>
    <label>費用<input id="hospitalCost" type="number"></label>
    <label class="memo">メモ<textarea id="hospitalMemo"></textarea></label>
    <button class="primary" type="submit">通院記録を保存</button>
  </form>
  <div id="hospitalList"></div>
  <h2>投薬記録</h2>
  <form id="medicineForm">
    <label>薬名<input id="medicineName"></label>
    <label>回数<input id="medicineDose"></label>
    <label>開始日<input id="medicineStart" type="date"></label>
    <label>終了日<input id="medicineEnd" type="date"></label>
    <label class="memo">メモ<textarea id="medicineMemo"></textarea></label>
    <button class="primary" type="submit">投薬記録を保存</button>
  </form>
  <div id="medicineList"></div>
</section>

<section id="graphView" class="view">
  <h1>グラフ</h1>
  <div id="graphTabs" class="tabs"></div>
  <div class="switch"><button data-graph="weight" class="active">体重</button><button data-graph="sand">砂浴び</button><button data-graph="walk">部屋んぽ</button></div>
  <canvas id="graph" width="350" height="240"></canvas>
</section>

<section id="moreView" class="view">
  <h1>その他</h1>
  <div id="annivBox" class="anniv card"></div>
  <button class="menu" onclick="show('profileView')">🐭 プロフィール・写真・アイコン</button>
  <button class="menu dangerMenu" onclick="deleteSelectedPet()">🗑 選択中のペットを削除</button>
  <button class="menu" onclick="show('medicalView')">🏥 通院・投薬記録</button>
  <button id="exportBtn" class="menu">⬇ データを書き出す</button>
  <button id="resetBtn" class="menu">🗑 すべて削除して空に戻す</button>
  <p class="notice">このアプリは記録用です。診断や治療の代わりにはなりません。</p>
</section>
</main>

<nav>
  <button data-view="homeView" class="active">🏠<small>ホーム</small></button>
  <button data-view="calendarView">📅<small>カレンダー</small></button>
  <button data-view="recordView">✏️<small>記録</small></button>
  <button data-view="graphView">📈<small>グラフ</small></button>
  <button data-view="moreView">…<small>その他</small></button>
</nav>
</div>

<dialog id="petDialog">
  <h1>ペット追加</h1>
  <label>名前<input id="newName" placeholder="モカ"></label>
  <label>種類<input id="newType" placeholder="チンチラ"></label>
  <label>性別<select id="newSex"><option value="♀">女の子</option><option value="♂">男の子</option><option value="不明">不明</option></select></label>
  <div class="dialogBtns"><button id="closePet" type="button">閉じる</button><button id="addPet" type="button" class="primary">追加する</button></div>
</dialog>

<script src="app.js"></script>
</body>
</html>
